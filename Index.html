<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Form</title>
</head>
<body>
  <h1>Contact Us</h1>
  <form action="https://formspree.io/f/your-form-id" method="POST">
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" required>

    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required>

    <label for="message">Message:</label>
    <textarea id="message" name="message" required></textarea>

    <button type="submit">Send</button>
  </form>

  <h2>Instagram Feed</h2>
  <img src="https://via.placeholder.com/150/0000FF/FFFFFF?text=Image1" alt="Instagram Image 1">
  <img src="https://via.placeholder.com/150/FF0000/FFFFFF?text=Image2" alt="Instagram Image 2">
  <img src="https://via.placeholder.com/150/00FF00/FFFFFF?text=Image3" alt="Instagram Image 3">
</body>
</html>
